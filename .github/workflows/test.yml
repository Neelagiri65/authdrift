name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install semgrep
        run: pip install semgrep

      - name: Validate rule syntax
        run: semgrep --validate --config src/authdrift/rules/

      - name: Scan vulnerable fixtures (must find at least 1 per file)
        run: |
          FAIL=0
          for f in tests/fixtures/*-vulnerable.*; do
            [ -f "$f" ] || continue
            COUNT=$(semgrep scan --config src/authdrift/rules/ "$f" --json 2>/dev/null \
              | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('results',[])))")
            if [ "$COUNT" -eq 0 ]; then
              echo "FAIL: $f produced 0 findings"
              FAIL=1
            else
              echo "OK: $f ($COUNT findings)"
            fi
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi

      - name: Verify safe fixtures (must find 0 each)
        run: |
          FAIL=0
          for f in tests/fixtures/safe-*.js tests/fixtures/safe-*.ts tests/fixtures/safe-*.py tests/fixtures/passport-safe.js; do
            [ -f "$f" ] || continue
            COUNT=$(semgrep scan --config src/authdrift/rules/ "$f" --json 2>/dev/null \
              | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('results',[])))")
            if [ "$COUNT" -ne 0 ]; then
              echo "FALSE POSITIVE: $f ($COUNT findings)"
              FAIL=1
            else
              echo "OK: $f"
            fi
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi

      - name: Summary
        run: |
          TOTAL=$(semgrep scan --config src/authdrift/rules/ tests/fixtures/ --json 2>/dev/null \
            | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('results',[])))")
          VULN=$(ls tests/fixtures/*-vulnerable.* 2>/dev/null | wc -l | tr -d ' ')
          SAFE=$(ls tests/fixtures/safe-*.* tests/fixtures/passport-safe.js 2>/dev/null | wc -l | tr -d ' ')
          echo "Rules validated. $TOTAL findings across $VULN vulnerable fixtures. $SAFE safe fixtures clean."
