name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install semgrep
        run: pip install semgrep

      - name: Scan all fixtures (must find exactly 8 issues)
        run: |
          set +e
          semgrep scan --config src/authdrift/rules/ tests/fixtures/ --error --json > /tmp/results.json
          EXIT=$?
          set -e
          if [ "$EXIT" -ne 1 ]; then
            echo "Expected exit 1 (findings), got $EXIT"
            exit 1
          fi
          COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/results.json')).get('results',[])))")
          if [ "$COUNT" -ne 8 ]; then
            echo "Expected 8 findings, got $COUNT"
            exit 1
          fi
          echo "OK: 8 findings detected across vulnerable fixtures, 0 false positives on safe fixtures"

      - name: Verify each safe fixture individually
        run: |
          for f in tests/fixtures/safe-*.js tests/fixtures/safe-*.ts tests/fixtures/safe-*.py tests/fixtures/passport-safe.js; do
            [ -f "$f" ] || continue
            semgrep scan --config src/authdrift/rules/ "$f" --error --quiet 2>/dev/null
            if [ $? -ne 0 ]; then
              echo "FALSE POSITIVE: $f"
              exit 1
            fi
          done
          echo "OK: all safe fixtures clean"
